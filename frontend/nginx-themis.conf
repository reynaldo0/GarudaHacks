# ============================================================================
# PROJECT THEMIS - Nginx Configuration
# ============================================================================
#
# Setup:
#   sudo cp nginx-themis.conf /etc/nginx/sites-available/themis
#   sudo ln -sf /etc/nginx/sites-available/themis /etc/nginx/sites-enabled/themis
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after DNS is pointing to this server):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d themis.my.id -d api.themis.my.id
#   sudo certbot renew --dry-run
# ============================================================================

# --- Frontend + API Proxy (themis.my.id) ---
server {
    listen 80;
    server_name themis.my.id www.themis.my.id;

    client_max_body_size 50M;

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Backend health (direct check)
    location /health {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
    }

    # WebSocket - Realtime Updates
    location /ws {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

# --- Backend API Direct (Unity / External Clients) ---
server {
    listen 80;
    server_name api.themis.my.id;

    client_max_body_size 50M;

    # All API endpoints
    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket - Direct Unity Connection
    location /ws {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
    }

    # API docs (optional, for development)
    location /docs {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
    }
}
