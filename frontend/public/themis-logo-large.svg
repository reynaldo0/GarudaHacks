<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#2D2A70"/>
  <circle cx="60" cy="60" r="52" fill="#2D2A70" stroke="#EC6C25" stroke-width="2" opacity="0.6"/>
  
  <!-- Train body -->
  <rect x="20" y="44" width="80" height="32" rx="8" fill="#EC6C25" opacity="0.9"/>
  
  <!-- Train windows (spatial grid) -->
  <rect x="26" y="50" width="14" height="20" rx="3" fill="#FFFFFF" opacity="0.9"/>
  <rect x="44" y="50" width="14" height="20" rx="3" fill="#FFFFFF" opacity="0.7"/>
  <rect x="62" y="50" width="14" height="20" rx="3" fill="#FFFFFF" opacity="0.5"/>
  <rect x="80" y="50" width="14" height="20" rx="3" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- AI Eye overlay -->
  <ellipse cx="60" cy="60" rx="36" ry="20" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.4"/>
  <circle cx="60" cy="60" r="10" fill="#EC6C25" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="4" fill="#FFFFFF"/>
  
  <!-- Neural network nodes -->
  <circle cx="20" cy="24" r="4" fill="#EC6C25" opacity="0.8"/>
  <circle cx="100" cy="24" r="4" fill="#EC6C25" opacity="0.8"/>
  <circle cx="20" cy="96" r="4" fill="#EC6C25" opacity="0.8"/>
  <circle cx="100" cy="96" r="4" fill="#EC6C25" opacity="0.8"/>
  
  <!-- Connection lines -->
  <line x1="20" y1="24" x2="60" y2="60" stroke="#EC6C25" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="24" x2="60" y2="60" stroke="#EC6C25" stroke-width="1.5" opacity="0.4"/>
  <line x1="20" y1="96" x2="60" y2="60" stroke="#EC6C25" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="96" x2="60" y2="60" stroke="#EC6C25" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Rail track -->
  <line x1="16" y1="84" x2="104" y2="84" stroke="#FFFFFF" stroke-width="2.5" opacity="0.3"/>
  <line x1="16" y1="87" x2="104" y2="87" stroke="#FFFFFF" stroke-width="1.2" opacity="0.2"/>
</svg>
