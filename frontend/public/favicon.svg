<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2D2A70"/>
  
  <!-- Train body -->
  <rect x="5" y="11" width="22" height="10" rx="2.5" fill="#EC6C25" opacity="0.9"/>
  
  <!-- Train windows -->
  <rect x="7" y="13" width="4" height="6" rx="1" fill="#FFFFFF" opacity="0.9"/>
  <rect x="13" y="13" width="4" height="6" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="19" y="13" width="4" height="6" rx="1" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- AI Eye center -->
  <circle cx="16" cy="16" r="3" fill="#EC6C25" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="16" cy="16" r="1.2" fill="#FFFFFF"/>
  
  <!-- Neural nodes -->
  <circle cx="6" cy="6" r="1.5" fill="#EC6C25" opacity="0.8"/>
  <circle cx="26" cy="6" r="1.5" fill="#EC6C25" opacity="0.8"/>
  <circle cx="6" cy="26" r="1.5" fill="#EC6C25" opacity="0.8"/>
  <circle cx="26" cy="26" r="1.5" fill="#EC6C25" opacity="0.8"/>
  
  <!-- Connections -->
  <line x1="6" y1="6" x2="16" y2="16" stroke="#EC6C25" stroke-width="0.6" opacity="0.4"/>
  <line x1="26" y1="6" x2="16" y2="16" stroke="#EC6C25" stroke-width="0.6" opacity="0.4"/>
  <line x1="6" y1="26" x2="16" y2="16" stroke="#EC6C25" stroke-width="0.6" opacity="0.4"/>
  <line x1="26" y1="26" x2="16" y2="16" stroke="#EC6C25" stroke-width="0.6" opacity="0.4"/>
  
  <!-- Rail track -->
  <line x1="4" y1="23" x2="28" y2="23" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
  <line x1="4" y1="24.5" x2="28" y2="24.5" stroke="#FFFFFF" stroke-width="0.6" opacity="0.2"/>
</svg>
