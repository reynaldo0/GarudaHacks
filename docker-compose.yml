version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: themis-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-themis_root_2026}
      MYSQL_DATABASE: themis
      MYSQL_USER: themis
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-themis_pass_2026}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - themis_mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-themis_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - themis-net

volumes:
  themis_mysql_data:
    driver: local

networks:
  themis-net:
    driver: bridge
